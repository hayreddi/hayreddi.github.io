baseURL = "https://hayreddi.github.io/"
title = "Hayreddi"
theme = "PaperMod"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[params]
  author = "Hayreddi"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/hayreddi"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# --- English ---
[languages.en]
  languageName = "English"
  weight = 1
  languageCode = "en"
  contentDir = "content/en"

[languages.en.params]
  description = "Exploring AI's impact on work, startups, and the future of humanity"

[languages.en.params.homeInfoParams]
  Title = "Welcome"
  Content = "Exploring AI's impact on work, startups, and the future of humanity."

[[languages.en.menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 5
[[languages.en.menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 10
[[languages.en.menu.main]]
  identifier = "archive"
  name = "Archive"
  url = "/archives/"
  weight = 15
[[languages.en.menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 20

